# Giftless PRODUCTION config — Git LFS server backed by Cloudflare R2 (po-g9y.11).
#
# Cut over from staging (HS256, one shared secret) to RS256 asymmetric auth:
#   * AUTH_PROVIDERS verifies every incoming token with the PUBLIC key only.
#   * PRE_AUTHORIZED_ACTION_PROVIDER signs the short-lived "verify" callbacks the
#     basic transfer issues, using the PRIVATE key.
#
# ONE keypair, not two. The bead body floated a separate dedicated keypair for the
# verify callbacks, but giftless's auth chain ABORTS on the first provider that
# rejects a token's signature (giftless/auth/__init__.py catches Unauthorized and
# stops — it does NOT try the next provider). Two keypairs on one auth path can't
# coexist. So a single keypair's PUBLIC key verifies both the client tokens minted
# by the issuer (Arc/CI) and Giftless's own verify callbacks; its PRIVATE key signs
# those callbacks. Keys are NOT baked in — they are mounted files materialized from
# Worker secrets at boot (cloudflare/container-entrypoint.sh). See cloudflare/README
# "Go-live" + ../README.md "JWT model" for the custody trade-off.

# Reject everything that does not carry a valid JWT. The JWT provider piggybacks
# on HTTP Basic (user "_jwt", password = the token) and also accepts a raw
# "Authorization: Bearer <jwt>" header.
AUTH_PROVIDERS:
  - factory: giftless.auth.jwt:factory
    options:
      algorithm: RS256
      # Verify-only: the public half of the single prod keypair. Verifies BOTH
      # client tokens (issuer-signed) and Giftless's own verify callbacks.
      public_key_file: /etc/giftless/jwt_public_key
      leeway: 60
      # Enforce the signing key id (po-g9y.13). A token's `kid` header must equal
      # this; lets us rotate keys (mint under a new kid, trust both during overlap)
      # and rejects tokens minted for a different key id. Giftless stamps the same
      # kid on its own verify callbacks (PRE_AUTHORIZED_ACTION_PROVIDER below), so
      # the check passes for them too. NB: aud/iss are NOT enforced — giftless
      # 1.7.1's verifier doesn't pass audience= to jwt.decode (PyJWT then rejects
      # ANY aud claim, including the callbacks), so we bind on kid only.
      key_id: giftless-rs256-1

# Giftless mints its own pre-authorized token for the post-upload "verify" action.
# Same keypair — sign with the PRIVATE key; AUTH_PROVIDERS above verifies the
# callback with the matching public key.
PRE_AUTHORIZED_ACTION_PROVIDER:
  factory: giftless.auth.jwt:factory
  options:
    algorithm: RS256
    private_key_file: /etc/giftless/jwt_private_key
    public_key_file: /etc/giftless/jwt_public_key
    default_lifetime: 900
    # Stamp the same kid on the verify callbacks so the AUTH_PROVIDER above
    # accepts them under key_id enforcement (po-g9y.13).
    key_id: giftless-rs256-1

# basic transfer: Giftless hands the client presigned R2 URLs (direct-to-R2
# upload/download). Sufficient for files < ~5 GB; multipart deferred (po-e24).
TRANSFER_ADAPTERS:
  basic:
    factory: giftless.transfer.basic_external:factory
    options:
      storage_class: r2storage:R2Storage
      storage_options:
        bucket_name: portaljs-giftless
        path_prefix: lfs
      action_lifetime: 900
